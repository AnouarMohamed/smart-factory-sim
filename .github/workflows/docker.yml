name: Docker

on:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - deploy/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - src/**
      - public/**
      - config/**
      - vite.config.ts
      - tsconfig*.json
      - .github/workflows/docker.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - deploy/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - src/**
      - public/**
      - config/**
      - vite.config.ts
      - tsconfig*.json
      - .github/workflows/docker.yml

permissions:
  contents: read

jobs:
  docker-build:
    name: Build production image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Compose file
        run: docker compose config --quiet

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: smart-factory-sim:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
