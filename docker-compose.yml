services:
  smart-factory-sim:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-factory-sim:local
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
